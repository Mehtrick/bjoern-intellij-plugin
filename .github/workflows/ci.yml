name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-cleanup: 'always'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test

    - name: Build plugin
      run: ./gradlew buildPlugin

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: build/reports/tests/test/

    - name: Upload workspace
      uses: actions/upload-artifact@v4
      with:
        name: workspace
        path: |
          .gradle/
          build/
          !build/idea-sandbox/

  verify-plugin-project-configuration:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-cleanup: 'always'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Download workspace
      uses: actions/download-artifact@v4
      with:
        name: workspace

    - name: Verify plugin project configuration
      run: ./gradlew verifyPluginProjectConfiguration

  verify-plugin-structure:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-cleanup: 'always'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Download workspace
      uses: actions/download-artifact@v4
      with:
        name: workspace

    - name: Verify plugin structure
      run: ./gradlew verifyPluginStructure

  verify-plugin:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-cleanup: 'always'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Download workspace
      uses: actions/download-artifact@v4
      with:
        name: workspace

    - name: Run plugin verifier
      run: ./gradlew verifyPlugin
        
